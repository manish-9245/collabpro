name: Asynchronous Security Scan & Quality Gate Worker

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to scan'
        required: true
        type: string

jobs:
  snyk-scan:
    name: Async Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: 🟢 Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🛡️ Run Snyk Security Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx snyk test --json --severity-threshold=high --org=${{ secrets.SNYK_ORG_ID }} > snyk_report.json || true

      - name: 📝 Post Snyk Status Hook Back to GitHub Commit Status
        if: always()
        run: |
          STATUS="success"
          if grep -q "high" snyk_report.json 2>/dev/null; then
            STATUS="failure"
          fi
          
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ inputs.commit_sha }} \
            -d "{\"state\":\"${STATUS}\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"Snyk Security Vulnerability Scan Complete\",\"context\":\"Snyk Security Shield\"}"

  sonar-scan:
    name: Async SonarCloud Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0

      - name: 📡 Run SonarCloud Static Code Check
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: 📝 Post Sonar Status Hook Back to GitHub Commit Status
        if: always()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ inputs.commit_sha }} \
            -d "{\"state\":\"success\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"SonarCloud Static Analysis Complete\",\"context\":\"SonarCloud Quality Gate\"}"
