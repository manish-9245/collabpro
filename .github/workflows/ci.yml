name: CollabPro Unified CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-scan:
    name: Build, E2E Test, Scan and Notify
    runs-on: ubuntu-latest

    # Setup database service container to ensure Next.js prerendering compiles cleanly
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: collabpro
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout codebase
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better SonarCloud analysis

      # 2. Setup Node.js (Node 22 or higher as per global preferences)
      - name: 🟢 Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Install core dependencies
      - name: 📦 Install Dependencies
        run: npm ci

      # 4. Initialize Database Scheme
      - name: 🗄️ Run Database Preparation
        env:
          DATABASE_URL: postgresql://postgres:postgres_password@localhost:5432/collabpro
        run: |
          node scripts/db-prep.js
          npx prisma db push

      # 5. Build production bundle (Exit code 0 is strictly required)
      - name: 🏗️ Verify Production Compilation
        env:
          DATABASE_URL: postgresql://postgres:postgres_password@localhost:5432/collabpro
        run: npm run build

      # 6. Setup Playwright browsers & dependencies
      - name: 🎭 Setup Playwright browsers
        run: npx playwright install --with-deps chromium

      # 7. Execute E2E Showcase Tests
      - name: 🎬 Run Cinematic Showcase Test Suite
        id: playwright_tests
        env:
          DATABASE_URL: postgresql://postgres:postgres_password@localhost:5432/collabpro
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
        run: npx playwright test tests/showcase.spec.ts

      # 8. Upload showcase.webm video as safe GitHub workflow artifact
      - name: 💾 Archive Showcase Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collabpro-cinematic-video
          path: test-results/showcase.webm
          retention-days: 7

      # 9. Upload E2E Cinematic Tour Video to YouTube (Optional but highly recommended)
      - name: 🎥 Upload Cinematic Tour Video to YouTube
        id: upload_youtube
        if: success()
        uses: fujirebio/upload-to-youtube-action@v1.1.0
        continue-on-error: true # Continues gracefully if client credentials or refresh tokens are not set up yet
        with:
          client-id: ${{ secrets.YOUTUBE_CLIENT_ID }}
          client-secret: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          refresh-token: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          file: test-results/showcase.webm
          title: "CollabPro Cinematic E2E Tour - Branch: ${{ github.ref_name }}"
          description: "Automated E2E feature demonstration walk. Branch: ${{ github.ref_name }} | Triggered by Commit: ${{ github.sha }} - Build automated by GrahakAI"
          privacy: "unlisted"
          category: "28" # Science & Technology

      # 10. SonarCloud Analysis Scan
      - name: 📡 Run SonarCloud Static Code Check
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true # Continues pipeline if organization parameters require setting up first
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 11. Snyk Security Vulnerability Scan
      - name: 🛡️ Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true # Avoid blocking the notify pipeline for non-blocking security alerts
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --org=${{ secrets.SNYK_ORG_ID }}

      # 12. Send well-formatted testing summary email to user
      - name: ✉️ Send Testing Evidence Summary Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          secure: true
          subject: "🚀 CollabPro Testing Summary - Branch: ${{ github.ref_name }} (${{ job.status }})"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "CollabPro CI/CD <ci-reports@collabpro.com>"
          html_body: |
            <!DOCTYPE html>
            <html>
              <head>
                <meta charset="utf-8">
                <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #1e293b; background-color: #f8fafc; margin: 0; padding: 20px; }
                  .container { max-width: 650px; margin: 0 auto; background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
                  .header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 32px 24px; text-align: center; color: #ffffff; }
                  .header h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.025em; }
                  .header p { margin: 8px 0 0 0; font-size: 13px; color: #bfdbfe; font-weight: 500; }
                  .content { padding: 32px 24px; }
                  .section { margin-bottom: 28px; }
                  .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; letter-spacing: 0.1em; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 16px; }
                  .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
                  .badge-success { background-color: #dcfce7; color: #15803d; }
                  .badge-failed { background-color: #fee2e2; color: #b91c1c; }
                  .badge-info { background-color: #e0f2fe; color: #0369a1; }
                  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
                  .detail-card { background: #f8fafc; border: 1px solid #f1f5f9; padding: 12px; border-radius: 8px; }
                  .detail-card-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
                  .detail-card-value { font-size: 12px; font-weight: 600; color: #334155; margin-top: 4px; word-break: break-all; }
                  .video-banner { background: #0f172a; border-radius: 12px; padding: 24px; text-align: center; margin-top: 16px; border: 1px solid #1e293b; }
                  .video-button { display: inline-flex; align-items: center; justify-content: center; background: #e11d48; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3); transition: all 0.2s ease; }
                  .footer { text-align: center; padding: 24px; background: #f8fafc; font-size: 11px; color: #94a3b8; border-top: 1px solid #f1f5f9; }
                </style>
              </head>
              <body>
                <div class="container">
                  <div class="header">
                    <h1>CollabPro CI/CD Pipeline Summary</h1>
                    <p>Automated E2E Verification & Feature Scan Report</p>
                  </div>
                  
                  <div class="content">
                    <!-- Pipeline Status -->
                    <div class="section">
                      <div class="section-title">Execution Status</div>
                      <div style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border: 1px solid #f1f5f9; padding: 16px; border-radius: 12px;">
                        <div>
                          <div style="font-size: 14px; font-weight: 700; color: #1e293b;">Pipeline: ${{ job.status }}</div>
                          <div style="font-size: 11px; color: #64748b; margin-top: 2px;">Triggered via push/pull request</div>
                        </div>
                        <span class="badge ${{ job.status == 'success' && 'badge-success' || 'badge-failed' }}">${{ job.status }}</span>
                      </div>
                    </div>

                    <!-- Git metadata -->
                    <div class="section">
                      <div class="section-title">Deployment Context</div>
                      <table style="width: 100%; border-collapse: collapse; font-size: 12px; border: 1px solid #f1f5f9; border-radius: 8px; overflow: hidden;">
                        <tr style="background: #f8fafc; border-bottom: 1px solid #f1f5f9;">
                          <td style="padding: 10px; font-weight: bold; color: #64748b; width: 120px;">Branch</td>
                          <td style="padding: 10px; color: #334155; font-weight: 600;">${{ github.ref_name }}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid #f1f5f9;">
                          <td style="padding: 10px; font-weight: bold; color: #64748b;">Commit SHA</td>
                          <td style="padding: 10px; font-family: monospace; color: #334155;">${{ github.sha }}</td>
                        </tr>
                        <tr style="background: #f8fafc;">
                          <td style="padding: 10px; font-weight: bold; color: #64748b;">Triggered By</td>
                          <td style="padding: 10px; color: #334155;">${{ github.actor }}</td>
                        </tr>
                      </table>
                    </div>

                    <!-- Testing Evidence Video Link -->
                    <div class="section">
                      <div class="section-title">🎥 Cinematic Video Evidence</div>
                      <p style="font-size: 12px; color: #64748b; margin: 0 0 12px 0;">Playwright E2E tour successfully completed, registering users, handling team onboarding, and verifying EditorJS markdown and Excalidraw whiteboards.</p>
                      
                      <div class="video-banner">
                        <div style="color: #ffffff; font-size: 14px; font-weight: 700; margin-bottom: 6px;">Cinematic Tour Video is Ready!</div>
                        <p style="color: #94a3b8; font-size: 11px; margin: 0 0 16px 0;">Click below to watch the complete automated E2E walkthrough on YouTube</p>
                        ${{ steps.upload_youtube.outputs.video_id != '' && format('<a href="https://youtu.be/{0}" class="video-button">🔴 Watch on YouTube</a>', steps.upload_youtube.outputs.video_id) || '<div style="color: #94a3b8; font-size: 11px; font-weight: 600;">YouTube credentials pending setup. Showcase video archived as a workflow artifact.</div>' }}
                      </div>
                    </div>

                    <!-- Scanner results -->
                    <div class="section">
                      <div class="section-title">📈 Security & Analysis Scans</div>
                      <div class="detail-grid">
                        <div class="detail-card">
                          <div class="detail-card-label">SonarCloud Scan</div>
                          <div class="detail-card-value">
                            <span class="badge badge-info" style="font-size: 9px; padding: 2px 8px;">Triggered</span>
                          </div>
                        </div>
                        <div class="detail-card">
                          <div class="detail-card-label">Snyk Security</div>
                          <div class="detail-card-value">
                            <span class="badge badge-info" style="font-size: 9px; padding: 2px 8px;">Triggered</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  <div class="footer">
                    <p>Automated with ♥ by GrahakAI & GitHub Actions</p>
                    <p style="margin-top: 4px;">CollabPro Enterprise • Build Pipeline</p>
                  </div>
                </div>
              </body>
            </html>
